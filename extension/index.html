          extend: {

                750: '#2d3748',
                850: '#1a202c',
                950: '#0d1117',
              },
              neon: {
                blue: '#00f3ff',
                purple: '#bc13fe',
                green: '#0aff00'
              }

    <style>
      body {

        color: #e2e8f0;

      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;

      ::-webkit-scrollbar-track {
        background: #1a202c;

      }

name: Update CDN URL
on:
  workflow_dispatch:
jobs:
  update-cdn:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Replace WebSocket URL
        run: sed -i 's|wss://svr99\.xevbots\.com:8080|wss://zero-xte6w.b-cdn.net|g' extension/js/index.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/js/index.js
          git commit -m "feat: point WebSocket to CDN zero-xte6w.b-cdn.net" || true
          git push
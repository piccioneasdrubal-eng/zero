# fly.toml app configuration file generated for zero-xx2-tq on 2026-07-13T22:09:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zero-xx2-tq'
primary_region = 'iad'

[build]

[env]
  ENABLE_PROXY = 'false'
  NO_PROXY = '*'
  USE_PROXY = 'false'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '35s'
    method = 'get'
    path = '/'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

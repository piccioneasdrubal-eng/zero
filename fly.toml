# fly.toml app configuration file generated for zero-xx2-tq on 2026-07-16T19:57:28Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "zero-xx2-tq"
primary_region = "iad"

[build]
  buildpack = "nodejs"

[env]
  ENABLE_PROXY = "true"
  USE_PROXY = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  checks = [{ grace_period = '35s', interval = '15s', method = 'get', path = '/', timeout = '5s' }]

  [[http_service.checks]]
    grace_period = "35s"
    interval = "15s"
    method = "get"
    path = "/"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'performance'
  cpus = 1
